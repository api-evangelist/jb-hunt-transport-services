specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: J.B. Hunt Transport Services
providerId: jb-hunt-transport-services
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Logistics
  - Freight
  - Transportation
description: 'FOCUS-aligned FinOps placeholder for J.B. Hunt 360 Connect: API access is bundled with
  the underlying freight relationship; the billable surface is the freight contract (linehaul, fuel
  surcharge, accessorials, demurrage), not API calls.'
notes: J.B. Hunt does not publish a public API rate card. Meters below model the economic surface a
  shipper or partner sees on a J.B. Hunt invoice.
sources:
  - https://www.jbhunt.com/
  - https://apiportal.jbhunt.com/docs/services
  - https://developer.jbhunt.com/connect-360
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: J.B. Hunt Transport Services, Inc.
serviceCategory: Logistics / Transportation
billingModel:
  pricingCategory: Per-Load + Accessorial
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Adjustment
    - Tax
focusColumns:
  ServiceName: J.B. Hunt 360
  ServiceCategory: Logistics / Transportation
  ProviderName: J.B. Hunt Transport Services
  PublisherName: J.B. Hunt Transport Services, Inc.
  InvoiceIssuerName: J.B. Hunt Transport Services, Inc.
  BillingCurrency: USD
meters:
  - name: linehaul_charge
    unit: load
    aggregation: sum
    dimensions:
      - mode
      - origin_region
      - destination_region
  - name: fuel_surcharge
    unit: load
    aggregation: sum
    dimensions:
      - mode
  - name: accessorials
    unit: event
    aggregation: sum
    dimensions:
      - accessorial_type
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - partner
principles:
  - name: Visibility
    description: Use the J.B. Hunt 360 platform's invoice and shipment APIs to extract per-load cost
      and accessorials; reconcile against carrier invoices monthly.
  - name: Allocation
    description: Tag shipments with cost center, business unit, and customer order so freight cost
      is allocated to the revenue line that drove the load.
  - name: Optimization
    description: Use 360 quoting to compare rates, consolidate LTL into FTL where possible, plan appointments
      to avoid detention/demurrage accessorials.
  - name: Accountability
    description: Logistics manager owns load-level cost and accessorial overruns; weekly review of
      anomalies in the 360 platform.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
