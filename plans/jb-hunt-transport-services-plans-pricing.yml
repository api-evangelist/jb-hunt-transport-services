modified: '2026-05-05'
reconciled: false
tags:
  - Logistics
  - Transportation
  - Trucking
  - Freight
  - Supply Chain
description: J.B. Hunt 360 Connect APIs are available to shippers and carriers under partner agreements
  through the J.B. Hunt 360 platform. There is no public, self-service rate card for the API itself;
  pricing is embedded in the underlying freight contract (rate per load, fuel surcharge, accessorials)
  and software-as-a-service relationships between J.B. Hunt and its customers. Developer access to the
  API portal is available to credentialed J.B. Hunt 360 customers and integration partners.
notes: J.B. Hunt does not publish API plan pricing. The economic exchange happens at the freight transaction
  layer (per-load freight rate + accessorials) rather than per-API-call.
sources:
  - https://apiportal.jbhunt.com/docs/services
  - https://developer.jbhunt.com/connect-360
  - https://www.jbhunt.com/technology/connectivity
plans:
  - id: jb-hunt-transport-services-360-connect
    name: J.B. Hunt 360 Connect (Partner)
    type: enterprise
    description: Free programmatic access for credentialed J.B. Hunt 360 shippers and carriers; the
      revenue-generating exchange is the underlying freight contract.
    entries:
      - label: API access
        name: api_access
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: included with 360 platform
        userMultiplied: false
      - label: Freight transaction
        name: freight_transaction
        type: metered
        metric: load
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: per freight contract
        userMultiplied: false
    elements:
      - name: Quoting / Rate
      - name: Order Management
      - name: Shipment Tracking
      - name: Document Management
      - name: Scheduling / Appointments
      - name: FTL and LTL operations
