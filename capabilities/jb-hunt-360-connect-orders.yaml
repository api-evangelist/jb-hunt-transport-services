naftiko: 1.0.0-alpha2
info:
  label: J.B. Hunt 360 Connect API — Orders
  description: 'J.B. Hunt 360 Connect API — Orders. 3 operations. Lead operation: Create Order. Self-contained Naftiko capability
    covering one Jb Hunt Transport Services business surface.'
  tags:
  - Jb Hunt Transport Services
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JB_HUNT_TRANSPORT_SERVICES_API_KEY: JB_HUNT_TRANSPORT_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: jb-hunt-360-connect-orders
    baseUri: https://api.jbhunt.com
    description: J.B. Hunt 360 Connect API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: searchorders
        method: GET
        description: Search Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: fromDate
          in: query
          type: string
        - name: toDate
          in: query
          type: string
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get Order Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: jb-hunt-360-connect-orders-rest
    port: 8080
    description: REST adapter for J.B. Hunt 360 Connect API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: createorder
        description: Create Order
        call: jb-hunt-360-connect-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: searchorders
        description: Search Orders
        call: jb-hunt-360-connect-orders.searchorders
        with:
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Get Order Details
        call: jb-hunt-360-connect-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jb-hunt-360-connect-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for J.B. Hunt 360 Connect API — Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jb-hunt-360-connect-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-orders
      description: Search Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jb-hunt-360-connect-orders.searchorders
      with:
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-details
      description: Get Order Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jb-hunt-360-connect-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
