specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: J.B. Hunt Transport Services
providerId: jb-hunt-transport-services
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Logistics
  - Transportation
  - Freight
description: J.B. Hunt does not publish standardized rate-limit documentation for the J.B. Hunt 360
  Connect API. Limits are provisioned per integration partner at the API gateway, with capacity sized
  to the volume of loads the partner moves with J.B. Hunt.
notes: No public rate-limit documentation. Contact your J.B. Hunt 360 integration manager for partner-specific
  limits.
sources:
  - https://apiportal.jbhunt.com/docs/services
  - https://developer.jbhunt.com/connect-360
responseCodes:
  throttled: 429
limits:
  - name: Partner Limit
    scope: api-key
    metric: varies
    limit: see partner integration agreement
policies:
  - name: Backoff
    description: Honor Retry-After when issued; back off exponentially with jitter on 429 / 503.
  - name: Partner Capacity
    description: Throughput is sized to partner load volume; raise via your J.B. Hunt 360 integration
      manager.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
