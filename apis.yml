name: J.B. Hunt Transport Services
description: >-
  J.B. Hunt Transport Services, Inc. is one of the largest transportation and
  logistics companies in North America, providing trucking, intermodal, and
  contract services. J.B. Hunt offers the 360 Connect API portal for shippers
  to access quotes, orders, tracking, documents, and scheduling.
