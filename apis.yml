apis:
  - name: J.B. Hunt 360 Connect API
    description: >-
      The J.B. Hunt 360 Connect API provides programmatic access to quoting,
      order management, shipment tracking, document management, and scheduling
      on the J.B. Hunt 360 platform. Supports full-truckload and LTL shipment
      operations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://apiportal.jbhunt.com/docs/services
